<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/login.css">
    <title>Entre na sua conta</title>
</head>

<body class="fundoPrincipalCor">
    <header class="cabecalho">
        <nav class="navigator">
            <div class="logoTitulo">
                <img src="https://storage.googleapis.com/workspace-0f70711f-8b4e-4d94-86f1-2a93ccde5887/image/7b67bf7c-70f5-4aff-a1ca-98b3bf985ffc.png" alt="Ícone do GameFolio - um controle de videogame estilizado com coroa" class="imgLogo">
                <span class="">GameFolio</span>
            </div>

            <div class="menu-Items">
                <a href="#">Explorar</a>
                <a href="#">Listas</a>
                <a href="#">Comunidade</a>
                <a href="#">Sobre</a>
            </div>
            </div>
        </nav>
    </header>



    <main class="main-container">
        <div class="card-login">
            <h1>Acesse sua conta</h1>
            <p>Informe seu e-mail e senha para entrar</p>
            <input type="email" name="email" id="emailLogin">
            <input type="password" name="password" id="passwordLogin">
            <div class="lembrarEforgetSenha">
                <input type="checkbox" name="lembrarAcesso" id="lembrarAcesso"> Lembrar-me
                <a href="#">Esqueceu sua senha?</a>
            </div>
            <Button class="entrarLogin" id="entrarLogin">Entrar</Button>
            Ainda não tem conta? <button>Cadastre-se</button>
        </div>
    </main>

</body>

</html>
